version: '3.8'

services:
  # Redis 消息队列服务
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - moondance-net

  # MongoDB 数据库服务
  mongodb:
    image: mongo:6.0
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=123456
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - moondance-net

  # Nginx 负载均衡
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - moondance-net

  # 后端API服务（默认3个副本）
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    command: python3 -u main_api.py --host 0.0.0.0 --port 8000 --no-ssl
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_USE_SSL=0
      - API_CERT_CN=localhost
      - API_KEY=myh
      - MONGO_URI=mongodb://admin:123456@mongodb:27017/
    volumes:
      - api_data:/app/data
      - ../certs:/app/certs:ro
    expose:
      - "8000"
    depends_on:
      - redis
    networks:
      - moondance-net

  # 异步任务处理Worker
  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    command: celery -A src.core.worker worker --loglevel=info --concurrency=4
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://admin:123456@mongodb:27017/
    volumes:
      - api_data:/app/data
    depends_on:
      - redis
    networks:
      - moondance-net

volumes:
  redis_data:
  api_data:
  mongo_data:

networks:
  moondance-net:
    driver: bridge
